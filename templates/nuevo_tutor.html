<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alta Tutor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    {% include 'partials/header.html' %}

    <!-- TODO (backend): Formulario de nuevo tutor temporal, actualmente no funciona,  -->
   <div class= "container mt-4">
     <h2>Registrar nuevo tutor</h2>
      <form>
        <div class="mb-2">
          <label>Nombre</label>
          <input type="text" name="nombre" class="form-control" />
        </div>
        <div class="mb-2">
          <label>Apellido</label>
          <input type="text" name="apellido" class="form-control" />
        </div>
        <div class="mb-2">
          <label>Teléfono</label>
          <input type="num" name="telefono" class="form-control" />
        </div>
        <div class="mb-2">
          <label>Email</label>
          <input type="email" name="email" class="form-control" />
        </div>
        <div class="mb-2">
          <label>Dirección</label>
          <input type="text" name="direccion" class="form-control" />
        </div>
        <div class="row">
          <div class="col-auto">
           <button type="submit" class="btn btn-success mt-2 ">Crear Tutor</button>
          </div>
          <div class="col-auto">
           <a href="{{ url_for('home_bp.nuevo_paciente') }}" class="btn btn-success mt-2">Volver</a>
          </div>
        </div>
      </form>
    </div>
  
  <!-- Footer -->
    {% include 'partials/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/paciente.js') }}"></script>
  </body>
</html>
